server:
  port: 8080

spring:
  application:
    name: workitem-service

  # H2 数据库配置
  datasource:
    url: jdbc:h2:mem:workitemdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（开发调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # 初始化数据
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
