<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作项管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1><a href="/">工作项管理系统</a></h1>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>工作项列表</h2>
            <button class="btn btn-primary" onclick="showCreateModal()">创建工作项</button>
        </div>

        <!-- 筛选条件 -->
        <div class="card">
            <div class="card-header">
                <h3>筛选</h3>
            </div>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <select class="form-control" style="width: auto;" id="filterStatus" onchange="loadWorkItems()">
                    <option value="">全部状态</option>
                    <option value="DRAFT">草稿</option>
                    <option value="ANALYZING">分析中</option>
                    <option value="READY">已准备</option>
                    <option value="IN_PROGRESS">开发中</option>
                    <option value="TESTING">测试中</option>
                    <option value="COMPLETED">已完成</option>
                </select>
                <select class="form-control" style="width: auto;" id="filterType" onchange="loadWorkItems()">
                    <option value="">全部类型</option>
                    <option value="STORY">需求</option>
                    <option value="BUG">缺陷</option>
                    <option value="TASK">任务</option>
                </select>
                <select class="form-control" style="width: auto;" id="filterPriority" onchange="loadWorkItems()">
                    <option value="">全部优先级</option>
                    <option value="P0">P0</option>
                    <option value="P1">P1</option>
                    <option value="P2">P2</option>
                    <option value="P3">P3</option>
                </select>
            </div>
        </div>

        <!-- 工作项列表 -->
        <div class="card">
            <table class="table" id="workItemList">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>类型</th>
                        <th>优先级</th>
                        <th>状态</th>
                        <th>负责人</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="8" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 创建工作项模态框 -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>创建工作项</h3>
                <button class="modal-close" onclick="closeCreateModal()">&times;</button>
            </div>
            <form id="createForm" onsubmit="handleCreate(event)">
                <div class="form-group">
                    <label for="title">标题 *</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <textarea class="form-control" id="description" name="description"></textarea>
                </div>
                <div class="form-group">
                    <label for="type">类型 *</label>
                    <select class="form-control" id="type" name="type" required>
                        <option value="STORY">需求</option>
                        <option value="BUG">缺陷</option>
                        <option value="TASK">任务</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="priority">优先级 *</label>
                    <select class="form-control" id="priority" name="priority" required>
                        <option value="P0">P0</option>
                        <option value="P1">P1</option>
                        <option value="P2" selected>P2</option>
                        <option value="P3">P3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="assignee">负责人</label>
                    <input type="text" class="form-control" id="assignee" name="assignee">
                </div>
                <div class="form-group">
                    <label for="tags">标签（逗号分隔）</label>
                    <input type="text" class="form-control" id="tags" name="tags" placeholder="例如: workflow, requirement">
                </div>
                <div class="form-group">
                    <label for="acceptanceCriteria">验收标准</label>
                    <textarea class="form-control" id="acceptanceCriteria" name="acceptanceCriteria"></textarea>
                </div>
                <div class="form-group">
                    <label for="riskLevel">风险等级</label>
                    <select class="form-control" id="riskLevel" name="riskLevel">
                        <option value="">无</option>
                        <option value="HIGH">高</option>
                        <option value="MEDIUM">中</option>
                        <option value="LOW">低</option>
                    </select>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                    <button type="button" class="btn" onclick="closeCreateModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        // 页面加载时获取工作项列表
        document.addEventListener('DOMContentLoaded', loadWorkItems);

        /**
         * 加载工作项列表
         */
        async function loadWorkItems() {
            const tbody = document.querySelector('#workItemList tbody');

            try {
                const params = {};
                const status = document.getElementById('filterStatus').value;
                const type = document.getElementById('filterType').value;
                const priority = document.getElementById('filterPriority').value;

                if (status) params.status = status;
                if (type) params.type = type;
                if (priority) params.priority = priority;

                const response = await API.workItems.list(params);
                const workItems = response.data;

                if (workItems.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无工作项</td></tr>';
                    return;
                }

                tbody.innerHTML = workItems.map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>
                            <a href="/detail.html?id=${item.id}" style="color: #1a73e8; text-decoration: none;">
                                ${item.title}
                            </a>
                        </td>
                        <td>${Utils.getTypeText(item.type)}</td>
                        <td><span class="${Utils.getPriorityClass(item.priority)}">${Utils.getPriorityText(item.priority)}</span></td>
                        <td><span class="badge ${Utils.getStatusClass(item.status)}">${Utils.getStatusText(item.status)}</span></td>
                        <td>${item.assignee || '-'}</td>
                        <td>${Utils.formatDate(item.createdAt)}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteWorkItem(${item.id})">删除</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="8" class="empty-state">加载失败: ${error.message}</td></tr>`;
            }
        }

        /**
         * 显示创建模态框
         */
        function showCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }

        /**
         * 关闭创建模态框
         */
        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('createForm').reset();
        }

        /**
         * 处理创建工作项
         */
        async function handleCreate(event) {
            event.preventDefault();

            const formData = new FormData(event.target);
            const tagsStr = formData.get('tags');

            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                type: formData.get('type'),
                priority: formData.get('priority'),
                assignee: formData.get('assignee'),
                tags: tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [],
                acceptanceCriteria: formData.get('acceptanceCriteria'),
                riskLevel: formData.get('riskLevel') || null
            };

            try {
                await API.workItems.create(data);
                Utils.showToast('工作项创建成功');
                closeCreateModal();
                loadWorkItems();
            } catch (error) {
                Utils.showToast(error.message, 'error');
            }
        }

        /**
         * 删除工作项
         */
        async function deleteWorkItem(id) {
            if (!confirm('确定要删除这个工作项吗？')) {
                return;
            }

            try {
                await API.workItems.delete(id);
                Utils.showToast('工作项删除成功');
                loadWorkItems();
            } catch (error) {
                Utils.showToast(error.message, 'error');
            }
        }
    </script>
</body>
</html>
